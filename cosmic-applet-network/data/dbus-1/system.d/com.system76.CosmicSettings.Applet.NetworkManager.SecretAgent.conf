<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Allows the COSMIC network applet to own the well-known bus name that the
  `nmrs` secret-agent registration requests on the system bus.

  Without this, `nmrs::agent::SecretAgent::register()` fails with
  org.freedesktop.DBus.Error.AccessDenied ("Request to own name refused by
  policy"), the agent never registers, and NetworkManager reports
  "No agents were available for this request" for any VPN that needs
  interactive secrets (e.g. OTP). See pop-os/cosmic-applets#1444.

  The applet appends a per-instance UUID element, so own_prefix is used.
-->
<busconfig>
  <policy context="default">
    <allow own_prefix="com.system76.CosmicSettings.Applet"/>
  </policy>
</busconfig>
